name: Extract AES Key (Run Once)

on:
  workflow_dispatch:

jobs:
  extract-key:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-29-x86-v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD ready"

      - name: Install Frida + download APK + Frida server
        run: |
          pip install frida-tools 2>&1 | tail -3
          echo "FV=$(frida --version 2>/dev/null | head -1)" >> $GITHUB_ENV
          curl -L -o /tmp/codycross.apks "https://dl.apkcombo.com/apk/2/com.fanatee.cody/405.674140609cedc1410daf86fa84804edfbf1d4104.apks" || true
          curl -L -o /tmp/fs.xz "https://github.com/frida/frida/releases/download/${{ env.FV }}/frida-server-${{ env.FV }}-android-x86.xz"
          xz -d /tmp/fs.xz && mv /tmp/fs /tmp/frida-server && chmod +x /tmp/frida-server
          ls -la /tmp/frida-server /tmp/codycross.apks

      - name: Run Frida extraction on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p /tmp/cxapk
            unzip -o /tmp/codycross.apks -d /tmp/cxapk
            adb install -r -t /tmp/cxapk/com.fanatee.cody.apk 2>&1 || true
            adb install -r -t /tmp/cxapk/config.armeabi_v7a.apk 2>&1 || true
            adb push /tmp/frida-server /data/local/tmp/frida-server
            adb shell chmod 755 /data/local/tmp/frida-server
            adb shell "/data/local/tmp/frida-server -D &"
            sleep 2
            adb shell monkey -p com.fanatee.cody -c android.intent.category.LAUNCHER 1
            sleep 5
            python3 -m frida -U -f com.fanatee.cody -l scripts/frida-extract.js --no-pause &
            sleep 60
            kill %1 2>/dev/null || true

      - name: Summary
        if: always()
        run: echo "Extraction attempt complete. Check logs for any captured AES key."