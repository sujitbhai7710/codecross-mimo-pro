name: Extract AES Key (Run Once)

on:
  workflow_dispatch:

jobs:
  extract-key:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-29-x86-v2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD ready"

      - name: Download CodyCross APK
        run: |
          echo "Downloading CodyCross APK..."
          curl -L -o /tmp/codycross.apks \
            "https://dl.apkcombo.com/apk/2/com.fanatee.cody/405.674140609cedc1410daf86fa84804edfbf1d4104.apks" 2>&1 || \
          curl -L -A "Mozilla/5.0" -o /tmp/codycross.apks \
            "https://d.apkpure.net/b/APK/com.fanatee.cody?version=latest" 2>&1 || true
          ls -lh /tmp/codycross.apks 2>/dev/null || echo "APK download failed"

      - name: Install Frida tools
        run: |
          pip install frida-tools 2>&1 | tail -3
          frida --version

      - name: Run Frida extraction
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "[*] Waiting for device..."
            adb wait-for-device
            sleep 15
            adb shell getprop sys.boot_completed

            echo "[*] Installing APK..."
            mkdir -p /tmp/cxapk && cd /tmp/cxapk
            unzip -o /tmp/codycross.apks 2>/dev/null || true
            for apk in /tmp/cxapk/*.apk; do
              [ -f "$apk" ] && adb install -r -t "$apk" 2>&1 || true
            done

            echo "[*] Downloading frida-server for x86..."
            FV=$(frida --version 2>/dev/null | head -1)
            echo "Frida version: $FV"
            curl -L -o /tmp/frida-server.xz \
              "https://github.com/frida/frida/releases/download/${FV}/frida-server-${FV}-android-x86.xz" 2>&1
            xz -d -f /tmp/frida-server.xz 2>/dev/null && chmod +x /tmp/frida-server
            adb push /tmp/frida-server /data/local/tmp/frida-server
            adb shell chmod 755 /data/local/tmp/frida-server
            adb shell "/data/local/tmp/frida-server -D &"
            sleep 3
            frida-ps -U 2>&1 | head -5

            echo "[*] Launching CodyCross..."
            adb shell monkey -p com.fanatee.cody -c android.intent.category.LAUNCHER 1
            sleep 8

            echo "[*] Running Frida hooks..."
            timeout 90 frida -U -f com.fanatee.cody -l scripts/frida-extract.js --no-pause 2>&1 | tee /tmp/frida-output.log || true
            timeout 30 frida -U -n "CodyCross" -l scripts/frida-extract.js 2>&1 | tee -a /tmp/frida-output.log || true

            echo ""
            echo "=== FRIDA EXTRACTION LOG ==="
            cat /tmp/frida-output.log 2>/dev/null || echo "No output"
            [ -f /tmp/frida-result.json ] && cat /tmp/frida-result.json || true

      - name: Extract key from logs
        run: |
          FOUND_KEY=""

          if [ -f /tmp/frida-output.log ]; then
            # Try multiple patterns to find the key
            FOUND_KEY=$(grep -oP 'AES-256 KEY CAPTURED' /tmp/frida-output.log | head -1)
            if [ -n "$FOUND_KEY" ]; then
              FOUND_KEY=$(grep -oP 'Key \(hex\): \K[a-f0-9]{64}' /tmp/frida-output.log | head -1)
            fi
            if [ -z "$FOUND_KEY" ]; then
              FOUND_KEY=$(grep -oP '"key_hex"\s*:\s*"\K[a-f0-9]{64}' /tmp/frida-output.log | head -1)
            fi
            if [ -z "$FOUND_KEY" ]; then
              FOUND_KEY=$(grep -oP '\K[a-f0-9]{64}' /tmp/frida-output.log | head -1)
            fi
          fi

          if [ -z "$FOUND_KEY" ] && [ -f /tmp/frida-result.json ]; then
            FOUND_KEY=$(python3 -c "
          import json
          with open('/tmp/frida-result.json') as f:
              d = json.load(f)
          if 'key_hex' in d: print(d['key_hex'])
          elif 'keys' in d:
              for k in d['keys']:
                  if k.get('length') == 32: print(k['hex']); break
          " 2>/dev/null)
          fi

          if [ -n "$FOUND_KEY" ]; then
            echo "GAME_AES_KEY=$FOUND_KEY" >> $GITHUB_ENV
            echo "KEY_FOUND=true" >> $GITHUB_ENV
            echo "=== KEY FOUND ==="
            echo "$FOUND_KEY"
          else
            echo "KEY_FOUND=false" >> $GITHUB_ENV
            echo "=== KEY NOT FOUND ==="
            echo "The automated emulator extraction did not find the AES key."
            echo "This is common — CodyCross uses IL2CPP which requires deeper analysis."
          fi

      - name: Save as GitHub Secret
        if: env.KEY_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install pynacl -q
          REPO="${{ github.repository }}"
          KEY="${GAME_AES_KEY}"

          # Get public key for encryption
          PUB=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")
          PK_VAL=$(echo "$PUB" | python3 -c "import sys,json;print(json.load(sys.stdin)['key'])")
          PK_ID=$(echo "$PUB" | python3 -c "import sys,json;print(json.load(sys.stdin)['key_id'])")

          # Encrypt with libsodium
          ENCRYPTED=$(python3 -c "
          import base64, sys
          from nacl import public
          pk_bytes = base64.b64decode('$PK_VAL')
          box = public.SealedBox(public.PublicKey(pk_bytes))
          enc = box.encrypt('$KEY'.encode())
          print(base64.b64encode(enc).decode())
          ")

          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/actions/secrets/GAME_AES_KEY" \
            -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$PK_ID\"}"
          echo "Secret saved!"

      - name: Summary
        if: always()
        run: |
          echo "=========================================="
          if [ "$KEY_FOUND" = "true" ]; then
            echo "  SUCCESS! AES key extracted and saved."
            echo "  The daily workflow will now auto-decrypt."
          else
            echo "  Key not found via emulator."
            echo "  Try manual extraction on a real Android device:"
            echo "    pip install frida-tools"
            echo "    frida -U -f com.fanatee.cody -l scripts/frida-extract.js --no-pause"
            echo "  Then add the key as GAME_AES_KEY secret."
          fi
          echo "=========================================="
