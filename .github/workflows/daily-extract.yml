name: Daily Extract Answers

on:
  schedule:
    # Run daily at 06:00 UTC (after new puzzle releases at ~05:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mundo:
        description: 'World number to fetch (default: auto)'
        required: false
        default: ''

jobs:
  extract-answers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch crossword answers
        run: |
          echo "=========================================="
          echo "  CodyCross Daily Answer Extraction"
          echo "  Date: $(date +%Y-%m-%d)"
          echo "  Endpoint: Crossword/TodaysCrossword"
          echo "  Encryption: None (unencrypted API)"
          echo "=========================================="

          if [ -n "${{ github.event.inputs.mundo }}" ]; then
            python3 fetcher/fetch_answers.py --mundo "${{ github.event.inputs.mundo }}"
          else
            python3 fetcher/fetch_answers.py
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/answers.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "[*] No new data to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "[+] New puzzle data detected!"
            git diff --stat data/answers.json
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "CodeCross Bot"
          git config user.email "bot@codecross-daily.com"
          git add data/
          git commit -m "Auto-update answers $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: extract-answers
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          exclude: |
            fetcher/**
            scripts/**
            .github/**
            *.py
            ANALYSIS.md
            REPORT.md

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
