name: Daily Fetch All Worlds

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_worlds:
        description: 'Max world number to fetch (default: auto-detect)'
        required: false
        default: ''
      workers:
        description: 'Parallel workers (default: 6)'
        required: false
        default: '6'

jobs:
  fetch-all-worlds:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch all world answers
        run: |
          echo "=========================================="
          echo "  CodyCross Answer Fetcher v4.0"
          echo "  Date: $(date +%Y-%m-%d)"
          echo "  Endpoint: Puzzle/GetMundo (production)"
          echo "  Encryption: None (appVersion=1.0.0)"
          echo "=========================================="

          MAX="${{ github.event.inputs.max_worlds }}"
          WORKERS="${{ github.event.inputs.workers }}"

          if [ -n "$MAX" ]; then
            echo "[*] Fetching worlds 1-$MAX"
            python3 fetcher/fetch_answers.py --max "$MAX" --workers "${WORKERS:-6}"
          else
            echo "[*] Auto-detecting and fetching ALL worlds"
            python3 fetcher/fetch_answers.py --all --workers "${WORKERS:-6}"
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/answers.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "[*] No new data changes"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "[+] New puzzle data detected!"
            git diff --stat data/answers.json
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "CodyCross Bot"
          git config user.email "bot@codycross-answers.com"
          git add data/
          git commit -m "Auto-update: fetch all worlds $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: fetch-all-worlds
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          exclude: |
            fetcher/**
            scripts/**
            .github/**
            *.py
            ANALYSIS.md
            REPORT.md

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
